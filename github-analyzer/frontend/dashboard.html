<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>GitInsight Dashboard</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>


<!-- NAVBAR (same as landing page) -->

<header class="navbar">

<div class="logo animate-logo">GitInsight</div>

<nav>
<a href="index.html#features">Features</a>
<a href="index.html#searchSection">Analyze</a>
</nav>

</header>


<!-- LOADING -->

<div id="loading" class="loading-screen">
<div class="spinner"></div>
<p>Analyzing GitHub profile...</p>
</div>



<!-- DASHBOARD -->

<section class="dashboard">

<div class="dashboard-container">

<h1 class="dashboard-title">Developer Analytics</h1>



<!-- SEARCH BAR -->

<div class="dashboard-search">

<input id="searchInput" placeholder="Enter GitHub username">

<button onclick="searchUser()">Analyze</button>

</div>



<!-- PROFILE CARD -->

<div class="card">
<h2>Profile</h2>
<div id="profile"></div>
</div>



<!-- STATS -->

<div id="stats" class="stats-grid"></div>



<!-- SCORE -->

<div class="card">
<h2>Developer Score</h2>

<div class="score-container">
<div id="score-bar"></div>
</div>

<p id="score-text"></p>

</div>



<!-- LANGUAGE CHART -->

<div class="card">
<h2>Language Distribution</h2>
<div class="chart-container">
<canvas id="languageChart"></canvas>
</div></div>



<!-- TOP REPOS -->

<div class="card">
<h2>Top Repositories</h2>
<div id="repos"></div>
</div>



<!-- AI SUMMARY -->

<div class="card">
<h2>AI Summary</h2>
<div id="summary"></div>
</div>



</div>

</section>



<script src="script.js"></script>

</body>
</html>
