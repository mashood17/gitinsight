<!DOCTYPE html>
<html>
<head>
<title>GitInsight Dashboard</title>

<div id="loading" class="loading">
<div class="spinner"></div>
<p>Analyzing GitHub profile...</p>
</div>

<link rel="stylesheet" href="style.css?v=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header class="header">

<h1 class="logo">GitInsight</h1>

<div class="search-box">
<input id="searchInput" placeholder="Search GitHub username">
<button onclick="searchUser()">Analyze</button>
</div>

</header>    
<div class="container">

<h1 class="title">GitInsight Dashboard</h1>

<div class="card">
<h2>Recent Searches</h2>
<div id="recent-searches"></div>
</div>

<div class="card">
<h2>Profile</h2>
<div id="profile"></div>
</div>

<div class="stats-grid" id="stats"></div>

<div class="card">
<h2>Developer Score</h2>
<div class="score-container">
<div id="score-bar"></div>
</div>
<p id="score-text"></p>
</div>

<div class="card">
<h2>Language Distribution</h2>
<canvas id="languageChart"></canvas>
</div>

<div class="card">
<h2>Top Repositories</h2>
<div id="repos"></div>
</div>

<div class="card">
<h2>AI Summary</h2>
<div id="summary"></div>
</div>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
